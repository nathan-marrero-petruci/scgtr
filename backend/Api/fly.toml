# Configuração do Fly.io para o backend

app = "scgtr-api"  # Substitua por um nome único para sua app
primary_region = "gig"  # Gigantea, Brasil (ou escolha: syd, jnb, lax, iad, etc)

[build]
  image = "scgtr-api:latest"

[env]
  DB_PATH = "/data/controle-ganhos.db"
  ASPNETCORE_ENVIRONMENT = "Production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[mounts]
  source = "data"
  destination = "/data"
  initial_size = "1gb"
